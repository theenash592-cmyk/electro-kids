<!DOCTYPE html>
<html>
<head>
    <title>ElectroKids Certificate Verification</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #c6aa58; /* gold background */
            padding: 50px;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
            color: #0a5c2f;
            margin-bottom: 10px;
        }

        .box {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: inline-block;
        }

        input {
            padding: 12px;
            width: 320px;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            background-color: #0a5c2f;
            color: white;
            border: none;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
        }

        .valid {
            color: green;
            font-weight: bold;
        }

        .invalid {
            color: red;
            font-weight: bold;
        }

        .credit {
            margin-top: 20px;
            font-size: 14px;
            color: green;
        }
    </style>
</head>

<body>

<div class="title">ELECTRO KIDS</div>

<div class="box">
    <h2>Certificate Verification</h2>

    <p><b>Certificate Number</b></p>
    <p style="font-size:13px;">
        Student No. | Semester No. | Batch No. | Batch Year
    </p>

    <input type="text" id="certID" placeholder="">
    <br>
    <button onclick="verifyCertificate()">Verify</button>

    <div class="result" id="result"></div>

    <div class="credit">
        Site developed by K. Theenash | Electro Kids
    </div>
</div>

<script>

const certificates = {

    "01010125": { name: "NOEL SHAAN", sem: "I", batch: "1", year: "2025", from: "01-Jan-25", to: "30-Jun-25" },
    "02010125": { name: "KOSANA THEENASH", sem: "I", batch: "1", year: "2025", from: "01-Jan-25", to: "30-Jun-25" },
    "03010125": { name: "VARAD NAIR", sem: "I", batch: "1", year: "2025", from: "01-Jan-25", to: "30-Jun-25" },
    "04010125": { name: "SHREST IYER", sem: "I", batch: "1", year: "2025", from: "01-Jan-25", to: "30-Jun-25" },

    "05020125": { name: "NOEL SHAAN", sem: "II", batch: "1", year: "2025", from: "01-Jul-25", to: "31-Jan-26" },
    "06020125": { name: "KOSANA THEENASH", sem: "II", batch: "1", year: "2025", from: "01-Jul-25", to: "31-Jan-26" },
    "07020125": { name: "VARAD NAIR", sem: "II", batch: "1", year: "2025", from: "01-Jul-25", to: "31-Jan-26" },
    "08020125": { name: "SHREST IYER", sem: "II", batch: "1", year: "2025", from: "01-Jul-25", to: "31-Jan-26" }

};

function verifyCertificate() {

    const id = document.getElementById("certID").value.trim();
    const resultDiv = document.getElementById("result");

    if (certificates[id]) {
        const cert = certificates[id];

        resultDiv.innerHTML = `
            <p class="valid">✔ Certificate Verified & Valid</p>
            <p><strong>Name:</strong> ${cert.name}</p>
            <p><strong>Semester:</strong> ${cert.sem}</p>
            <p><strong>Batch:</strong> ${cert.batch}</p>
            <p><strong>Year:</strong> ${cert.year}</p>
            <p><strong>Duration:</strong> ${cert.from} to ${cert.to}</p>
        `;
    } else {
        resultDiv.innerHTML = `<p class="invalid">✖ Invalid Certificate Number</p>`;
    }
}

</script>

</body>
</html>

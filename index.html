<!DOCTYPE html>
<html>
<head>
  <title>Electro Kids Certificate Verification</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, gold, #f7e27d);
      padding: 50px;
    }

    h1 {
      font-size: 40px;
      font-weight: bold;
      color: darkgreen;
    }

    .logo {
      width: 120px;
      margin-bottom: 10px;
    }

    input {
      padding: 12px;
      width: 320px;
      font-size: 14px;
      margin-top: 20px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      margin-left: 10px;
      cursor: pointer;
    }

    #result {
      margin-top: 30px;
      font-size: 20px;
      font-weight: bold;
    }

    /* ❌ blinking red if not verified */
    .not-found {
      color: red;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* 🎉 confetti canvas */
    #confetti {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    /* credit */
    .credit {
      margin-top: 40px;
      color: green;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <!-- 🖼️ LOGO -->
  <img src="logo.png" class="logo">

  <!-- 🟢 TITLE -->
  <h1>ELECTRO KIDS</h1>

  <!-- 🔎 INPUT -->
  <input type="text" id="code" placeholder="Certificate Number | Student No. | Semester No. | Batch No. | Batch Year">
  
  <button onclick="verify()">Verify</button>

  <!-- RESULT -->
  <div id="result"></div>

  <!-- 🎉 CONFETTI -->
  <canvas id="confetti"></canvas>

  <!-- 👇 SCRIPT -->
  <script>

    // 📚 STUDENT DATABASE
    const data = {
      "01010125": "NOEL SHAAN",
      "02010125": "KOSANA THEENASH",
      "03010125": "VARAD NAIR",
      "04010125": "SHREST IYER",
      "05020125": "NOEL SHAAN",
      "06020125": "KOSANA THEENASH",
      "07020125": "VARAD NAIR",
      "08020125": "SHREST IYER"
    };

    function verify() {
      let code = document.getElementById("code").value.trim();
      let result = document.getElementById("result");

      if (data[code]) {
        result.className = "";
        result.innerHTML = "✅ Verified!<br>Student: " + data[code];
        startConfetti();
      } else {
        result.className = "not-found";
        result.innerHTML = "❌ Not Verified!";
        stopConfetti();
      }
    }

    // 🎉 CONFETTI SYSTEM
    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let pieces = [];
    let running = false;

    function startConfetti() {
      pieces = [];
      running = true;

      for (let i = 0; i < 120; i++) {
        pieces.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          size: Math.random() * 8 + 4,
          speed: Math.random() * 3 + 2,
          color: `hsl(${Math.random()*360}, 100%, 50%)`,
          tilt: Math.random() * 10 - 5
        });
      }

      animate();
    }

    function stopConfetti() {
      running = false;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function animate() {
      if (!running) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      pieces.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.size, p.size);

        p.y += p.speed;
        p.x += Math.sin(p.y * 0.05) + p.tilt;

        if (p.y > canvas.height) {
          p.y = -10;
          p.x = Math.random() * canvas.width;
        }
      });

      requestAnimationFrame(animate);
    }

  </script>

  <!-- 🟢 CREDIT -->
  <div class="credit">
    Site developed by K. Theenash | Electro Kids
  </div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>ElectroKids Certificate Verification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f6f9;
            padding: 50px;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: inline-block;
        }

        input {
            padding: 10px;
            width: 250px;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            background-color: #1a3c6e;
            color: white;
            border: none;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
        }

        .valid {
            color: green;
            font-weight: bold;
        }

        .invalid {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Certificate Verification</h2>
    <p>Enter Certificate ID</p>

    <input type="text" id="certID" placeholder="Enter Certificate Code">
    <br>
    <button onclick="verifyCertificate()">Verify</button>

    <div class="result" id="result"></div>
</div>

    function verifyCertificate() {
        const id = document.getElementById("certID").value.trim();

            const cert = certificates[id];
            resultDiv.innerHTML = `
                <p class="valid">✔ Certificate Verified & Valid</p>
                <p><strong>Name:</strong> ${cert.name}</p>
                <p><strong>Workshop:</strong> ${cert.workshop}</p>
                <p><strong>Duration:</strong> ${cert.duration}</p>
            `;
        } else {
            resultDiv.innerHTML = `<p class="invalid">✖ Invalid Certificate ID</p>`;
        }
    }
</script>

<!DOCTYPE html>
<html>
<head>
    <title>ElectroKids Certificate Verification</title>

    <!-- Fancy Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, gold, #f5d76e);
            padding: 50px;
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 40px;
            font-weight: bold;
            color: #0a3d2f;
            margin-bottom: 10px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #fff; }
            to { text-shadow: 0 0 20px #0a3d2f; }
        }

        .logo {
            width: 120px;
            margin-bottom: 10px;
        }

        .box {
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            display: inline-block;
        }

        input {
            padding: 12px;
            width: 320px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            background-color: #0a3d2f;
            color: white;
            border: none;
            cursor: pointer;
        }

        .valid {
            color: green;
            font-weight: bold;
            animation: pop 0.5s ease;
        }

        .invalid {
            color: red;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%,100% {opacity:1;}
            50% {opacity:0;}
        }

        @keyframes pop {
            from {transform: scale(0.8);}
            to {transform: scale(1);}
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .credit {
            margin-top: 20px;
            color: green;
        }
    </style>
</head>

<body>

<!-- LOGO -->
<img src="logo.png" class="logo">

<div class="title">ELECTRO KIDS</div>

<div class="box">
    <h2>Certificate Verification</h2>

    <p><b>Certificate Number</b></p>
    <p style="font-size:13px;">
        Student No. | Semester No. | Batch No. | Batch Year
    </p>

    <input type="text" id="certID">
    <br>
    <button onclick="verifyCertificate()">Verify</button>

    <div id="result"></div>

    <div class="credit">
        Site developed by K. Theenash | Electro Kids
    </div>
</div>

<canvas id="confetti"></canvas>

<script>

const certificates = {
    "01010125": { name: "NOEL SHAAN", sem: "I", batch: "1", year: "2025" },
    "02010125": { name: "KOSANA THEENASH", sem: "I", batch: "1", year: "2025" },
    "03010125": { name: "VARAD NAIR", sem: "I", batch: "1", year: "2025" },
    "04010125": { name: "SHREST IYER", sem: "I", batch: "1", year: "2025" },
    "05020125": { name: "NOEL SHAAN", sem: "II", batch: "1", year: "2025" },
    "06020125": { name: "KOSANA THEENASH", sem: "II", batch: "1", year: "2025" },
    "07020125": { name: "VARAD NAIR", sem: "II", batch: "1", year: "2025" },
    "08020125": { name: "SHREST IYER", sem: "II", batch: "1", year: "2025" }
};

function verifyCertificate() {
    const id = document.getElementById("certID").value.trim();
    const resultDiv = document.getElementById("result");

    if (certificates[id]) {
        const cert = certificates[id];

        resultDiv.innerHTML = `
            <p class="valid">✔ Certificate Verified & Valid</p>
            <p><strong>${cert.name}</strong></p>
            <p>Semester: ${cert.sem}</p>
        `;

        startConfetti();

    } else {
        resultDiv.innerHTML = `<p class="invalid">✖ Invalid Certificate Number</p>`;
    }
}

/* CONFETTI EFFECT */
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confetti = [];

function startConfetti() {
    confetti = [];
    for (let i = 0; i < 100; i++) {
        confetti.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 6,
            d: Math.random() * 5
        });
    }

    animateConfetti();
}

function animateConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    confetti.forEach(c => {
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.fillStyle = "gold";
        ctx.fill();
    });

    requestAnimationFrame(animateConfetti);
}

</script>

</body>
</html>
